server:
  port: 8080

spring:
  application:
    name: llm-gateway-sse
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER:llm_gateway}
    password: ${RABBITMQ_DEFAULT_PASS:llm_gateway}

llm-gateway:
  security:
    api-key:
      enabled: false
      pepper: ${API_KEY_PEPPER:}
      hashes: []
  postgres:
    host: ${POSTGRES_HOST:localhost}
    port: ${POSTGRES_PORT:5432}
    database: ${POSTGRES_DB:llm_gateway}
    username: ${POSTGRES_USER:llm_gateway}
    password: ${POSTGRES_PASSWORD:llm_gateway}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
