server:
  port: 8080

spring:
  application:
    name: llm-gateway-sse
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER:llm_gateway}
    password: ${RABBITMQ_DEFAULT_PASS:llm_gateway}

llm-gateway:
  security:
    api-key:
      enabled: false
      pepper: ${API_KEY_PEPPER:}
      hashes: []
  ratelimit:
    enabled: false
    rpm: 100
    window-seconds: 65
  postgres:
    host: ${POSTGRES_HOST:localhost}
    port: ${POSTGRES_PORT:5432}
    database: ${POSTGRES_DB:llm_gateway}
    username: ${POSTGRES_USER:llm_gateway}
    password: ${POSTGRES_PASSWORD:llm_gateway}
  m4:
    persistence:
      enabled: ${M4_PERSISTENCE_ENABLED:true}
      connect-timeout-seconds: ${M4_PERSISTENCE_CONNECT_TIMEOUT_SECONDS:2}
    events:
      enabled: ${M4_EVENTS_ENABLED:true}
      exchange: ${M4_EVENTS_EXCHANGE:llm.gateway.events}
      routing-key: ${M4_EVENTS_ROUTING_KEY:request.completed}
    cost-estimation:
      chars-per-token: ${M4_COST_CHARS_PER_TOKEN:4}
      usd-per-1k-tokens: ${M4_COST_USD_PER_1K_TOKENS:0.001}
      algorithm-version: ${M4_COST_ALGORITHM_VERSION:v1_chars_div_4}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        gateway_chat_stream_latency: true
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [trace=%X{traceId:-} span=%X{spanId:-}]"
