name: "🐞 Bug 报告"
description: "报告一个可复现的问题"
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！为了快速定位问题，请尽量提供最小可复现步骤与日志。

  - type: textarea
    id: what_happened
    attributes:
      label: 发生了什么？
      description: 简要描述现象与期望行为。
      placeholder: 例如：调用 /v1/chat/stream 时，SSE 连接 10 秒后断开…
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
      description: 给出最小复现步骤与命令（建议包含 curl / docker compose / mvn 命令）。
      placeholder: |
        1. docker compose up -d --build
        2. curl -N -H "Accept: text/event-stream" ...
        3. 观察到...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志/截图
      description: 粘贴关键日志（可脱敏），或附上截图。若有 requestId，请务必提供。
      render: shell
    validations:
      required: false

  - type: textarea
    id: env
    attributes:
      label: 环境信息
      description: 操作系统、JDK、Docker Desktop 版本等。
      placeholder: |
        OS:
        JDK:
        Maven:
        Docker:
        Compose:
    validations:
      required: false

