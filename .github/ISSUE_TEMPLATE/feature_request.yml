name: "✨ 功能需求"
description: "提出一个新功能或改进建议"
title: "[Feature] "
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你要解决什么问题？
      description: 描述痛点/场景/动机。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你期望的方案/接口/行为。
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准（DoD）
      description: 用可测试的方式描述“做完了”的标准。
      placeholder: |
        - docker compose up 后可用 curl 验证...
        - 指标/日志包含...
    validations:
      required: false

